<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Βοηθός Ερωτηματολογίων Ψωρίασης</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div>
          <h1>Βοηθός Ερωτηματολογίων Ψωρίασης</h1>
          <p id="draft-status">Φόρτωση...</p>
          <p id="demo-banner" class="demo-banner" hidden></p>
        </div>
        <div id="form-nav" role="list" aria-label="Πρόοδος ερωτηματολογίων"></div>
        <div id="generate-panel" class="generate-panel">
          <button id="generate-button" type="button" disabled>Δημιουργία PDF</button>
        </div>
      </aside>

      <section class="quiz-panel">
        <header class="quiz-header">
          <div>
            <p id="form-title"></p>
            <p id="form-description" class="form-description" hidden></p>
            <h2 id="question-label"></h2>
            <p id="question-prompt" class="question-prompt" hidden></p>
          </div>
          <span id="progress-label"></span>
        </header>

        <div class="progress-track" aria-hidden="true">
          <div id="progress-fill"></div>
        </div>


        <form id="question-form">
          <p id="answer-hint" class="answer-hint" hidden>Διπλό κλικ σε μια απάντηση για να την επιλέξετε και να προχωρήσετε αυτόματα.</p>
          <div id="control-host"></div>
          <p id="error-message" role="alert"></p>
        </form>

        <footer class="actions">
          <button id="back-button" type="button">Πίσω</button>
          <button id="clear-button" type="button">Καθαρισμός προσχεδίου</button>
          <button id="next-button" type="button">Επόμενο</button>
        </footer>

        <section id="result-panel" class="result-panel" hidden>
          <h3>Συμπληρωμένα PDF</h3>
          <div id="result-links"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
